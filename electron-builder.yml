appId: com.promptforge.app
productName: Prompt Forge
copyright: Copyright © 2026

directories:
  output: release

files:
  - dist/**
  - electron/main.cjs
  - electron/preload.js
  - node_modules/**
  - package.json

asar: true
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/bindings/**
  - node_modules/file-uri-to-path/**

mac:
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  identity: null
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  title: "Prompt Forge ${version}"
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  certificateFile: null
  certificatePassword: null
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: portable
      arch: [x64, arm64]
    - target: msi
      arch: [x64, arm64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Prompt Forge

msi:
  oneClick: false

linux:
  icon: assets/icon-256x256.png
  target:
    - target: AppImage
      arch: [x64]
    - target: snap
      arch: [x64]
    - target: deb
      arch: [x64]

snap:
  publish: null

npmRebuild: true
